<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">

  <title>Dyng — Housing, Societies & Rides for Your Campus</title>
  <meta name="description" content="Dyng is the super app for campus life: flats & flatmates, verified PGs, societies & events, and campus rides — all in one chat-style app. Live at Delhi University, expanding worldwide.">
  <link rel="canonical" href="https://www.dyng.in/">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Dyng">
  <meta property="og:title" content="Dyng — Your entire campus life. One app.">
  <meta property="og:description" content="Flats & flatmates, verified PGs, societies & events, campus rides. One app, every campus.">
  <meta property="og:url" content="https://www.dyng.in/">

  <script type="application/ld+json">
  {
    "@context":"https://schema.org","@type":"WebSite","name":"Dyng","url":"https://www.dyng.in",
    "description":"Super app for campus life: housing, flatmates, verified PGs, societies, events and rides."
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --wa-green:#008069; --wa-accent:#00A884; --wa-light:#D9F3EC;
      --ink:#111B21; --gray:#667781; --line:#E9EDEF; --chip:#F0F2F5;
      --navy:#1B2E5B; --lime:#A6D437; --tick:#53BDEB;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#D1D7DB;color:var(--ink);display:flex;justify-content:center;min-height:100vh}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    a{text-decoration:none;color:inherit}
    .app{width:100%;max-width:760px;min-height:100vh;background:#fff;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.15);position:relative;padding-bottom:82px}

    /* ============ HEADER ============ */
    .head{padding:14px 16px 6px;display:flex;align-items:center;gap:6px;position:sticky;top:0;background:#fff;z-index:20}
    .brand{display:flex;align-items:center;gap:9px;flex:1}
    .brand .logo{width:34px;height:34px;border-radius:10px;background:var(--navy);color:var(--lime);display:grid;place-items:center;font-weight:800;font-size:18px}
    .brand h1{font-size:23px;font-weight:800;color:var(--wa-green);letter-spacing:-.01em}
    .head .ic{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:17px;color:#54656F}
    .head .ic:hover{background:var(--chip)}

    /* ============ SEARCH ============ */
    .search{margin:8px 12px 4px;background:var(--chip);border-radius:999px;padding:12px 16px;display:flex;align-items:center;gap:11px;font-size:14.5px;color:var(--gray);cursor:pointer}
    .search:hover{background:#E7EAEE}
    .search .ai{margin-left:auto;background:linear-gradient(120deg,var(--lime),#7FAF1B);color:var(--navy);font-size:10px;font-weight:800;border-radius:999px;padding:3px 9px}

    /* ============ CAMPUS STRIP ============ */
    .campus{margin:10px 12px 2px;display:flex;gap:7px;overflow-x:auto}
    .campus::-webkit-scrollbar{display:none}
    .campus button{flex:none;background:var(--chip);color:#54656F;border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:700;white-space:nowrap}
    .campus button.on{background:var(--wa-light);color:var(--wa-green);font-weight:800}

    /* ============ CHAT LIST ============ */
    .list{flex:1;padding-top:2px}
    .sect{font-size:11px;font-weight:800;color:var(--gray);letter-spacing:.06em;text-transform:uppercase;padding:13px 16px 3px}
    .chat{display:flex;gap:13px;padding:11px 16px 0;align-items:center;cursor:pointer;transition:background .12s}
    .chat:hover{background:#F5F6F6}
    .av{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;font-size:24px;flex:none;position:relative}
    .av .on-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;border-radius:50%;background:var(--wa-accent);border:2.5px solid #fff}
    .av .vtick{position:absolute;bottom:-1px;right:-2px;width:19px;height:19px;border-radius:50%;background:var(--lime);color:var(--navy);font-size:10px;display:grid;place-items:center;border:2px solid #fff;font-weight:800}
    .cbody{flex:1;min-width:0;border-bottom:1px solid var(--line);padding-bottom:11px}
    .crow1{display:flex;align-items:baseline;gap:8px}
    .cname{font-size:16px;font-weight:600;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
    .cname .off{font-size:9px;background:var(--navy);color:var(--lime);border-radius:999px;padding:2px 6px;font-weight:800;flex:none}
    .ctime{font-size:11.5px;color:var(--gray);flex:none}
    .ctime.unread{color:var(--wa-accent);font-weight:800}
    .crow2{display:flex;align-items:center;gap:8px;margin-top:2px}
    .cmsg{font-size:13.5px;color:var(--gray);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cmsg .tick{color:var(--tick);font-size:12px;letter-spacing:-2px;margin-right:3px}
    .cmsg b{color:#54656F;font-weight:600}
    .cmsg .soon{background:#FFF6D4;color:#8A5B00;border-radius:6px;padding:1px 7px;font-size:10.5px;font-weight:800;margin-right:5px}
    .badge{background:var(--wa-accent);color:#fff;border-radius:999px;min-width:21px;height:21px;padding:0 6px;font-size:11.5px;font-weight:800;display:grid;place-items:center;flex:none}
    .pin{color:var(--gray);font-size:12px;flex:none}

    /* ============ FAB + BOTTOM NAV ============ */
    .fab{position:fixed;bottom:98px;right:calc(50% - 380px + 18px);width:56px;height:56px;border-radius:18px;background:var(--wa-accent);color:#fff;font-size:22px;display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,168,132,.4);z-index:30}
    @media(max-width:800px){.fab{right:18px}}
    .bnav{position:fixed;bottom:0;left:0;right:0;max-width:760px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:9px 4px calc(9px + env(safe-area-inset-bottom));z-index:40}
    .bnav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);font-size:11.5px;font-weight:600;min-width:64px;padding:2px 0}
    .bnav a .bi{font-size:20px;line-height:1;padding:3px 17px;border-radius:999px}
    .bnav a.on{color:var(--ink);font-weight:800}
    .bnav a.on .bi{background:var(--wa-light)}

    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;border-radius:999px;padding:11px 20px;font-size:12.5px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.35);z-index:60;transition:transform .3s;max-width:92vw;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast .g{color:#7AE3C3}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>

<div class="app">

  <div class="head">
    <div class="brand"><span class="logo">D</span><h1>Dyng</h1></div>
    <button class="ic" onclick="toastMsg('📷 Post a photo — room, flat or event')" aria-label="Camera">📷</button>
    <button class="ic" onclick="toastMsg('⋮ Profile · Saved · Settings')" aria-label="Menu">⋮</button>
  </div>

  <div class="search" onclick="toastMsg('✨ Speak or type: “girl roommate in Vijay Nagar under 9k”')">
    🔍 <span>Ask Dyng AI or Search</span><span class="ai">✨ AI</span>
  </div>

  <div class="campus" id="campusRow"></div>

  <div class="list" id="list"></div>

  <button class="fab" onclick="toastMsg('✍️ New post — speak it, type it, or fill the form')" aria-label="New post">✏️</button>
</div>

<nav class="bnav" aria-label="App navigation">
  <a href="index.html" class="on"><span class="bi">💬</span>Modules</a>
  <a href="housing/flats.html"><span class="bi">🏠</span>Housing</a>
  <a href="events/index.html"><span class="bi">🎪</span>Events</a>
  <a href="rides/index.html"><span class="bi">🛵</span>Rides</a>
</nav>

<div class="toast" id="toast"></div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

var campuses=[
  {id:'du',label:'📍 North Campus · Delhi'},
  {id:'mumbai',label:'Vile Parle · Mumbai'},
  {id:'london',label:'Camden · London'},
  {id:'new',label:'＋ Start my campus'}
];
var campus='du';

var chats={
  du:[
    {pin:true,href:'housing/flats.html',av:'🏠',bg:'#D9F3EC',name:'Flats & Flatmates',off:true,
     who:'Ananya S.',msg:'1 girl needed for 2BHK near GTB metro — ₹8.5k',time:'2m',unread:12,online:true},
    {href:'housing/flats.html',av:'✓',bg:'#1B2E5B',fg:'#A6D437',name:'Dyng Verified PGs',off:true,
     msg:'3 verified PGs here · zero brokerage · monthly-rated',time:'1h',unread:3},
    {href:'events/index.html',av:'🎪',bg:'#EFE5FF',name:'Events & Societies',
     who:'Rangmanch',msg:'Fresher auditions open — 3 openings 🎭',time:'12m',unread:8,online:true},
    {href:'rides/index.html',av:'🛵',bg:'#FFF3C2',name:'Campus Rides',
     msg:'Harsh V. is 3 min away · GTB → Kamla Nagar',time:'25m',tick:true},
    {href:'housing/flats.html',av:'🤝',bg:'#F7F2FF',name:'Find Together — Squads',
     who:'Mehak J.',msg:'2 of us need 2 more girls — meet Sat 4 PM ☕',time:'3h',unread:2},
    {href:'housing/roomies.html',av:'💚',bg:'#FFE4EF',name:'Roomies — Matcher',
     msg:'4 new compatible roommates for you',time:'5h',unread:4},
    {href:'#',av:'💼',bg:'#E7F5EE',name:'Internships & Gigs',soon:true,
     msg:'Campus jobs, part-time & internships',time:''},
    {href:'#',av:'📚',bg:'#DCF1FF',name:'Notes & Papers',soon:true,
     msg:'PYQs, notes & senior guidance',time:''}
  ],
  mumbai:[
    {pin:true,href:'housing/flats.html',av:'🏠',bg:'#D9F3EC',name:'Flats & Flatmates',off:true,
     who:'Ishaan D.',msg:'1 flatmate for 2BHK, 8 min to NMIMS — ₹16k',time:'8m',unread:6,online:true},
    {href:'housing/flats.html',av:'✓',bg:'#1B2E5B',fg:'#A6D437',name:'Dyng Verified PGs',off:true,
     msg:'2 verified PGs here · zero brokerage',time:'2h',unread:2},
    {href:'housing/flats.html',av:'🤝',bg:'#F7F2FF',name:'Find Together — Squads',
     who:'Kiara F.',msg:'MBA fresher — anyone want to team up?',time:'4h',unread:1},
    {href:'events/index.html',av:'🎪',bg:'#EFE5FF',name:'Events & Societies',soon:true,
     msg:'Bring your society to Vile Parle',time:''},
    {href:'rides/index.html',av:'🛵',bg:'#FFF3C2',name:'Campus Rides',soon:true,
     msg:'Riders onboarding now',time:''}
  ],
  london:[
    {pin:true,href:'housing/flats.html',av:'🏠',bg:'#D9F3EC',name:'Flats & Flatmates',off:true,
     who:'Emma W.',msg:'1 housemate, 3-bed flat 10 min to UCL — £780',time:'5m',unread:4,online:true},
    {href:'housing/flats.html',av:'✓',bg:'#1B2E5B',fg:'#A6D437',name:'Dyng Verified Residences',off:true,
     msg:'1 partnered residence · contract & deposit verified',time:'3h',unread:1},
    {href:'housing/flats.html',av:'🤝',bg:'#F7F2FF',name:'Find Together — Squads',
     who:'Tomás R.',msg:'Intl student forming a house-hunt group',time:'7h',unread:2},
    {href:'events/index.html',av:'🎪',bg:'#EFE5FF',name:'Events & Societies',soon:true,
     msg:'Coming to Camden',time:''}
  ]
};

function renderCampus(){
  document.getElementById('campusRow').innerHTML=campuses.map(function(c){
    return '<button class="'+(c.id===campus?'on':'')+'" data-c="'+c.id+'">'+c.label+'</button>';
  }).join('');
  document.querySelectorAll('#campusRow button').forEach(function(b){
    b.onclick=function(){
      if(b.dataset.c==='new'){toastMsg('🌍 Bring Dyng to your campus — <span class=g>become the founding admin</span>');return;}
      campus=b.dataset.c;renderCampus();renderList();
    };
  });
}

function chatRow(c){
  var avStyle='background:'+c.bg+';'+(c.fg?'color:'+c.fg+';font-weight:800;font-size:22px;':'');
  return '<a class="chat" href="'+(c.soon?'javascript:void(0)':c.href)+'"'+
    (c.soon?' onclick="toastMsg(\'🔜 <span class=g>'+c.name+'</span> — launching next on this campus\')"':'')+'>'+
    '<div class="av" style="'+avStyle+'">'+c.av+
      (c.online?'<span class="on-dot"></span>':'')+
      (c.off?'<span class="vtick">✓</span>':'')+
    '</div>'+
    '<div class="cbody">'+
      '<div class="crow1"><span class="cname">'+c.name+(c.off?'<span class="off">DYNG</span>':'')+'</span>'+
      '<span class="ctime '+(c.unread?'unread':'')+'">'+c.time+'</span></div>'+
      '<div class="crow2"><span class="cmsg">'+
        (c.soon?'<span class="soon">SOON</span>':'')+
        (c.tick?'<span class="tick">✓✓</span>':'')+
        (c.who?'<b>'+c.who+':</b> ':'')+c.msg+
      '</span>'+
      (c.pin?'<span class="pin">📌</span>':'')+
      (c.unread?'<span class="badge">'+c.unread+'</span>':'')+
    '</div></div></a>';
}

function renderList(){
  var list=chats[campus]||[];
  var pinned=list.filter(function(c){return c.pin;});
  var rest=list.filter(function(c){return !c.pin;});
  var html='';
  if(pinned.length)html+='<div class="sect">📌 Pinned</div>'+pinned.map(chatRow).join('');
  if(rest.length)html+='<div class="sect">All modules</div>'+rest.map(chatRow).join('');
  document.getElementById('list').innerHTML=html;
}

var tt;
function toastMsg(html){
  var t=document.getElementById('toast');
  t.innerHTML=html;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2800);
}

renderCampus();renderList();
</script>
</body>
</html>
